<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gallery — NAVAM</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --navy: #1a2a5e;
      --gold: #c9a84c;
      --gold-light: #f0d080;
      --cream: #fdf8ef;
      --white: #ffffff;
      --shadow: 0 8px 32px rgba(26,42,94,0.13);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--cream);
      color: var(--navy);
      min-height: 100vh;
    }

    /* ── HERO ── */
    .hero {
      background: linear-gradient(135deg, #0d1a3a 0%, #1a2a5e 55%, #2a3f8f 100%);
      padding: 64px 24px 60px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute; inset: 0;
      background-image: radial-gradient(rgba(201,168,76,0.11) 1px, transparent 1px);
      background-size: 28px 28px;
    }
    .hero::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 500px; height: 260px;
      background: radial-gradient(ellipse, rgba(201,168,76,0.07) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-frame {
      position: absolute; inset: 14px;
      border: 1px solid rgba(201,168,76,0.22);
      border-radius: 4px; pointer-events: none;
    }
    .corner {
      position: absolute;
      width: 20px; height: 20px;
      border-color: var(--gold); border-style: solid; opacity: 0.55;
    }
    .corner-tl { top: 18px; left: 18px; border-width: 2px 0 0 2px; }
    .corner-tr { top: 18px; right: 18px; border-width: 2px 2px 0 0; }
    .corner-bl { bottom: 18px; left: 18px; border-width: 0 0 2px 2px; }
    .corner-br { bottom: 18px; right: 18px; border-width: 0 2px 2px 0; }

    .hero-content {
      position: relative; z-index: 2;
      animation: fadeUp 0.9s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .hero-badge {
      display: inline-block;
      background: rgba(201,168,76,0.14);
      border: 1px solid rgba(201,168,76,0.42);
      color: var(--gold-light);
      font-size: 0.74rem; letter-spacing: 3px;
      text-transform: uppercase;
      padding: 5px 18px; border-radius: 20px;
      margin-bottom: 18px;
    }
    .hero-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.9rem, 5.5vw, 3.4rem);
      color: #ffffff; line-height: 1.18;
      text-shadow: 0 2px 18px rgba(0,0,0,0.3);
    }
    .hero-title em { color: var(--gold-light); font-style: italic; }
    .hero-divider {
      width: 46px; height: 2px;
      background: var(--gold);
      margin: 18px auto 0; border-radius: 2px;
    }

    /* ── STICKY NAV ── */
    nav {
      background: var(--navy);
      padding: 13px 32px;
      display: flex; align-items: center;
      justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 16px rgba(0,0,0,0.25);
    }
    .nav-logo {
      font-family: 'Playfair Display', serif;
      color: var(--gold-light); font-size: 1.05rem; letter-spacing: 1px;
    }
    .nav-links { display: flex; gap: 24px; }
    .nav-links a {
      color: rgba(255,255,255,0.65); text-decoration: none;
      font-size: 0.88rem; font-weight: 600; letter-spacing: 0.5px;
      transition: color 0.2s;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--gold-light); }

    /* ── ALBUM GRID ── */
    .album-section {
      max-width: 1100px;
      margin: 52px auto 60px;
      padding: 0 20px;
    }
    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem; color: var(--navy);
      margin-bottom: 28px;
      display: flex; align-items: center; gap: 12px;
    }
    .section-title::after {
      content: ''; flex: 1; height: 2px;
      background: linear-gradient(to right, var(--gold), transparent);
    }
    .album-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 28px;
    }

    /* ── ALBUM CARD ── */
    .album-card {
      background: var(--white);
      border-radius: 16px; overflow: hidden;
      box-shadow: var(--shadow); cursor: pointer;
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      border: 2px solid transparent;
    }
    .album-card:hover {
      transform: translateY(-7px);
      box-shadow: 0 20px 52px rgba(26,42,94,0.18);
      border-color: var(--gold);
    }
    .album-thumb-wrap {
      position: relative; overflow: hidden; height: 215px;
    }
    .album-thumb {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      transition: transform 0.45s ease;
    }
    .album-card:hover .album-thumb { transform: scale(1.06); }

    /* Placeholder shown when image fails to load */
    .album-thumb-placeholder {
      display: none;
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #dde1f5, #b8c0e8);
      flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; color: var(--navy); opacity: 0.65; font-size: 0.85rem;
    }

    .album-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(26,42,94,0.65), transparent 55%);
      opacity: 0; transition: opacity 0.3s;
      display: flex; align-items: flex-end; padding: 16px;
    }
    .album-card:hover .album-overlay { opacity: 1; }
    .album-overlay-text {
      color: white; font-size: 0.85rem;
      font-weight: 700; letter-spacing: 0.5px;
    }
    .album-info {
      padding: 18px 20px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .album-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.08rem; color: var(--navy);
    }
    .album-count { font-size: 0.8rem; color: #999; margin-top: 3px; }
    .view-btn {
      background: var(--navy); color: var(--gold-light);
      border: none; border-radius: 8px;
      padding: 8px 16px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.84rem; font-weight: 700;
      cursor: pointer; transition: background 0.2s, color 0.2s;
      white-space: nowrap;
    }
    .view-btn:hover { background: var(--gold); color: var(--navy); }

    /* ── LIGHTBOX ── */
    #lightbox {
      display: none; position: fixed; inset: 0;
      background: rgba(6,10,28,0.97);
      z-index: 1000; flex-direction: column;
      align-items: center; justify-content: center;
    }
    #lightbox.active { display: flex; }

    .lb-header {
      position: absolute; top: 0; left: 0; right: 0;
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
    }
    .lb-title {
      font-family: 'Playfair Display', serif;
      color: var(--gold-light); font-size: 1.15rem;
    }
    .lb-counter { color: rgba(255,255,255,0.5); font-size: 0.88rem; }
    #lb-close {
      background: none;
      border: 2px solid rgba(255,255,255,0.3);
      color: white; width: 38px; height: 38px;
      border-radius: 50%; font-size: 1.1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, border-color 0.2s;
    }
    #lb-close:hover { background: var(--gold); border-color: var(--gold); color: var(--navy); }

    .lb-image-wrap {
      position: relative; display: flex;
      align-items: center; justify-content: center;
      max-width: 90vw; max-height: 75vh;
    }
    #lb-img {
      max-width: 90vw; max-height: 75vh;
      object-fit: contain; border-radius: 10px;
      box-shadow: 0 8px 60px rgba(0,0,0,0.7);
      animation: imgIn 0.22s ease;
    }
    @keyframes imgIn {
      from { opacity: 0; transform: scale(0.96); }
      to   { opacity: 1; transform: scale(1); }
    }
    .lb-nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.2);
      color: white; width: 48px; height: 48px;
      border-radius: 50%; font-size: 1.3rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, border-color 0.2s; z-index: 10;
    }
    .lb-nav:hover { background: var(--gold); border-color: var(--gold); color: var(--navy); }
    #lb-prev { left: -68px; }
    #lb-next { right: -68px; }

    @media (max-width: 640px) {
      #lb-prev { left: 6px; }
      #lb-next { right: 6px; }
    }

    .lb-thumbnails {
      display: flex; gap: 8px;
      margin-top: 16px; padding: 4px 16px;
      overflow-x: auto; max-width: 90vw;
      scrollbar-width: thin; scrollbar-color: var(--gold) transparent;
    }
    .lb-thumb {
      width: 58px; height: 46px; object-fit: cover;
      border-radius: 5px; cursor: pointer; opacity: 0.45;
      border: 2px solid transparent; flex-shrink: 0;
      transition: opacity 0.2s, border-color 0.2s;
    }
    .lb-thumb.active, .lb-thumb:hover { opacity: 1; border-color: var(--gold); }

    /* ── FOOTER ── */
    footer {
      background: var(--navy);
      color: rgba(255,255,255,0.55);
      text-align: center; padding: 22px 16px; font-size: 0.84rem;
    }
    footer span { color: var(--gold-light); }
  </style>
</head>
<body>

<!-- ══ HERO ══ -->
<section class="hero">
  <div class="hero-frame"></div>
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>
  <div class="hero-content">
    <div class="hero-badge">📸 Photo Gallery</div>
    <h1 class="hero-title">NAVAM<br><em>JNV Mahe</em></h1>
    <div class="hero-divider"></div>
  </div>
</section>

<!-- ══ NAV ══ -->
<nav>
  <div class="nav-logo">NAVAM Gallery</div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="#" class="active">Gallery</a>
  </div>
</nav>

<!-- ══ ALBUMS ══ -->
<div class="album-section">
  <div class="section-title">Albums</div>
  <div class="album-grid" id="albumGrid"></div>
</div>

<!-- ══ LIGHTBOX ══ -->
<div id="lightbox">
  <div class="lb-header">
    <div class="lb-title" id="lb-title"></div>
    <div class="lb-counter" id="lb-counter"></div>
    <button id="lb-close">✕</button>
  </div>
  <div class="lb-image-wrap">
    <button class="lb-nav" id="lb-prev">&#8592;</button>
    <img id="lb-img" src="" alt=""/>
    <button class="lb-nav" id="lb-next">&#8594;</button>
  </div>
  <div class="lb-thumbnails" id="lb-thumbs"></div>
</div>

<footer>
  &copy; 2025 <span>NAVAM</span> — Navodaya Alumni Association Mahe. All rights reserved.
</footer>

<script>
  // ════════════════════════════════════════════════════════
  //  ALBUM DATA
  //  - folder: path relative to gallery.html
  //  - cover: filename of the cover image inside that folder
  //  - images: all filenames in the album (including cover)
  //  NOTE: filenames are case-sensitive — must match exactly!
  // ════════════════════════════════════════════════════════
  const albums = [
    {
      id: 'campus-life',
      name: 'Campus Life',
      folder: 'images/gallery/campus-life/',
      cover: 'Campus life 1.jpeg',
      images: [
        'Campus life 1.jpeg',
        'Campus life 2.jpeg',
        'Campus life 3.jpeg',
        'Campus life 4.jpeg',
        'Campus life 5.jpeg',
        'Campus life 6.jpeg',
      ]
    },
    {
      id: 'sports-day',
      name: 'Sports Day',
      folder: 'images/gallery/sports-day/',
      cover: 'Sports 1.jpeg',
      images: [
        'Sports 1.jpeg',
        'Sports 2.jpeg',
        'Sports 3.jpeg',
        'Sports 4.jpeg',
        'Sports 5.jpeg',
        'Sports 6.jpeg',
        'Sports 7.jpeg',
      ]
    },
    {
      id: 'silver-jubilee-2012',
      name: 'Silver Jubilee Celebration 2012',
      folder: 'images/gallery/silver-jubilee-2012/',
      cover: 'SJ 1.jpeg',
      images: [
        'SJ 1.jpeg',
        'SJ 2.jpeg',
        'SJ 3.jpeg',
        'SJ 4.jpeg',
        'SJ 5.jpeg',
        'SJ 6.jpeg',
        'SJ 7.jpeg',
        'SJ 8.jpeg',
        'SJ 9.jpeg',
        'SJ 10.jpeg',
      ]
    }
  ];

  // ── Build Album Cards ──
  const grid = document.getElementById('albumGrid');

  albums.forEach(album => {
    const coverSrc = album.folder + album.cover;
    const card = document.createElement('div');
    card.className = 'album-card';
    card.innerHTML = `
      <div class="album-thumb-wrap">
        <img
          class="album-thumb"
          src="${coverSrc}"
          alt="${album.name}"
          onerror="
            this.style.display='none';
            this.nextElementSibling.style.display='flex';
          "
        />
        <div class="album-thumb-placeholder">
          <svg width="36" height="36" fill="none" stroke="#1a2a5e" stroke-width="1.5" viewBox="0 0 24 24">
            <rect x="3" y="3" width="18" height="18" rx="3"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <path d="M21 15l-5-5L5 21"/>
          </svg>
          <span>Cover image not found</span>
          <small style="opacity:0.6;font-size:0.72rem">${coverSrc}</small>
        </div>
        <div class="album-overlay">
          <span class="album-overlay-text">Click to view slideshow →</span>
        </div>
      </div>
      <div class="album-info">
        <div>
          <div class="album-name">${album.name}</div>
          <div class="album-count">${album.images.length} photo${album.images.length !== 1 ? 's' : ''}</div>
        </div>
        <button class="view-btn">View Album</button>
      </div>
    `;
    card.addEventListener('click', () => openAlbum(album));
    grid.appendChild(card);
  });

  // ── Lightbox Logic ──
  let currentAlbum = null;
  let currentIndex = 0;

  function openAlbum(album) {
    currentAlbum = album;
    currentIndex = 0;
    document.getElementById('lb-title').textContent = album.name;
    document.getElementById('lightbox').classList.add('active');
    document.body.style.overflow = 'hidden';
    buildThumbs();
    showImage(0);
  }

  function showImage(idx) {
    currentIndex = idx;
    const img = document.getElementById('lb-img');
    img.src = currentAlbum.folder + currentAlbum.images[idx];
    img.alt = currentAlbum.name + ' — Photo ' + (idx + 1);
    img.style.animation = 'none';
    img.offsetHeight; // reflow to re-trigger animation
    img.style.animation = '';
    document.getElementById('lb-counter').textContent =
      `${idx + 1} / ${currentAlbum.images.length}`;
    document.querySelectorAll('.lb-thumb').forEach((t, i) =>
      t.classList.toggle('active', i === idx));
    const active = document.getElementById('lb-thumbs').querySelectorAll('.lb-thumb')[idx];
    if (active) active.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
  }

  function buildThumbs() {
    const wrap = document.getElementById('lb-thumbs');
    wrap.innerHTML = '';
    currentAlbum.images.forEach((file, i) => {
      const t = document.createElement('img');
      t.className = 'lb-thumb' + (i === 0 ? ' active' : '');
      t.src = currentAlbum.folder + file;
      t.alt = 'Thumb ' + (i + 1);
      t.addEventListener('click', () => showImage(i));
      wrap.appendChild(t);
    });
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('active');
    document.body.style.overflow = '';
  }

  document.getElementById('lb-prev').addEventListener('click', () =>
    showImage((currentIndex - 1 + currentAlbum.images.length) % currentAlbum.images.length));
  document.getElementById('lb-next').addEventListener('click', () =>
    showImage((currentIndex + 1) % currentAlbum.images.length));
  document.getElementById('lb-close').addEventListener('click', closeLightbox);
  document.getElementById('lightbox').addEventListener('click', e => {
    if (e.target === document.getElementById('lightbox')) closeLightbox();
  });
  document.addEventListener('keydown', e => {
    if (!document.getElementById('lightbox').classList.contains('active')) return;
    if (e.key === 'ArrowLeft')  document.getElementById('lb-prev').click();
    if (e.key === 'ArrowRight') document.getElementById('lb-next').click();
    if (e.key === 'Escape')     closeLightbox();
  });
</script>
</body>
</html>
